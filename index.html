<script>
// ════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ════════════════════════════════════════════
const TOTAL_YEARS = 13_800_000_000;
const NOW         = 2026;
const FUTURE_END  = NOW + 500;        // 右邊硬邊界
const TIMELINE_START = -TOTAL_YEARS;
const TIMELINE_END   = FUTURE_END;

// ════════════════════════════════════════════
//  AXIS TREE
// ════════════════════════════════════════════
const AXES = {
  cosmos:       { color:'#a78bfa', label:'宇宙',     startYear:-13800000000, endYear:null, parent:null,         order: 0,  zoomMin:0    },
  'solar-system':{ color:'#818cf8', label:'太陽系',   startYear:-4600000000,  endYear:null, parent:'cosmos',     order: 1,  zoomMin:0    },
  earth:        { color:'#60a5fa', label:'地球',     startYear:-4540000000,  endYear:null, parent:'cosmos',     order: 2,  zoomMin:0    },
  life:         { color:'#34d399', label:'生命',     startYear:-3800000000,  endYear:null, parent:'earth',      order: 3,  zoomMin:0    },
  'human-evo':  { color:'#fbbf24', label:'人類演化', startYear:-4000000,     endYear:null, parent:'life',       order: 4,  zoomMin:0    },
  cross:        { color:'#e2e8f0', label:'跨文明',   startYear:-10000,       endYear:null, parent:'human-evo',  order: 5,  zoomMin:0    },

  // ── 東方文明 ──
  east:         { color:'#f87171', label:'東方文明', startYear:-3500,        endYear:null, parent:'cross',      order: 6,  zoomMin:0    },
  mideast:      { color:'#fde68a', label:'中東',     startYear:-3500,        endYear:null, parent:'east',       order: 7,  zoomMin:0.58 },
  india:        { color:'#86efac', label:'印度',     startYear:-2600,        endYear:null, parent:'east',       order: 8,  zoomMin:0.58 },
  china:        { color:'#fca5a5', label:'中國',     startYear:-2070,        endYear:null, parent:'east',       order: 9,  zoomMin:0.58 },
  'china-b':    { color:'#fb923c', label:'並立政權', startYear:-771,         endYear:null, parent:'china',      order:10,  zoomMin:0.75 },
  taiwan:       { color:'#f9a8d4', label:'臺灣',     startYear:-30000,       endYear:null, parent:'east',       order:11,  zoomMin:0.58 },
  japan:        { color:'#fdba74', label:'日本',     startYear:-300,         endYear:null, parent:'east',       order:12,  zoomMin:0.58 },

  // ── 西方文明 ──
  west:         { color:'#c084fc', label:'西方文明', startYear:-3500,        endYear:null, parent:'cross',      order:13,  zoomMin:0    },
  greece:       { color:'#c4b5fd', label:'希臘羅馬', startYear:-800,         endYear:476,  parent:'west',       order:14,  zoomMin:0.58 },
  europe:       { color:'#a5b4fc', label:'歐洲',     startYear:500,          endYear:null, parent:'west',       order:15,  zoomMin:0.58 },
  americas:     { color:'#93c5fd', label:'美洲',     startYear:1492,         endYear:null, parent:'west',       order:16,  zoomMin:0.58 },

  // ── 宗教軸 ──
  judaism:      { color:'#fcd34d', label:'猶太教',   startYear:-2000,        endYear:null, parent:'mideast',    order:17,  zoomMin:0.58 },
  christianity: { color:'#f0abfc', label:'基督教',   startYear:30,           endYear:null, parent:'greece',     order:18,  zoomMin:0.58 },
  islam:        { color:'#6ee7b7', label:'伊斯蘭教', startYear:610,          endYear:null, parent:'mideast',    order:19,  zoomMin:0.58 },
  buddhism:     { color:'#fda4af', label:'佛教',     startYear:-490,         endYear:null, parent:'india',      order:20,  zoomMin:0.58 },
  hinduism:     { color:'#fbbf24', label:'印度教',   startYear:-1500,        endYear:null, parent:'india',      order:21,  zoomMin:0.65 },
  taoism:       { color:'#86efac', label:'道教',     startYear:-550,         endYear:null, parent:'china',      order:22,  zoomMin:0.65 },
};

// ── 間距常數 ──
const LANE_GAP_BASE = 54;   // 預設每條軸的高度間距（px）
const TOP_MARGIN    = 138;  // 頂部保留給時代標籤

// ── 計算可見軸清單（已排序）──
// 如果目前視窗右邊界超過 endYear，且 zoom 夠深看到子軸層，就隱藏該已消亡文明
function getVisibleAxes() {
  const zoom = currentZoom();
  // 當 zoom 夠深（子軸可見），用 viewEnd 判斷文明是否已消亡
  const checkEnd = zoom >= 0.58;

  return Object.entries(AXES)
    .filter(([id, ax]) => {
      if (hiddenAxes.has(id)) return false;
      // 子軸 zoom 門檻
      if (ax.zoomMin > 0 && zoom < ax.zoomMin) return false;
      // 消亡判斷：zoom 夠深 + 有 endYear + 視窗左邊界已超過 endYear → 隱藏
      if (checkEnd && ax.endYear != null && viewStart > ax.endYear + 50) return false;
      return true;
    })
    .sort((a, b) => a[1].order - b[1].order);
}

// ── 子軸 fade-in alpha（zoom 超過 zoomMin 後漸入）──
function subAxisAlpha(ax) {
  if (ax.zoomMin === 0) return 1;
  return Math.min(1, (currentZoom() - ax.zoomMin) / 0.06);
}

// ── 人類演化線 fade-out（子文明出現後逐漸淡化）──
function humanEvoAlpha() {
  const zoom = currentZoom();
  // 完全淡出在 zoom > 0.72
  if (zoom < 0.58) return 1;
  if (zoom > 0.72) return 0.15;
  return 1 - (zoom - 0.58) / 0.14 * 0.85;
}

// ── 每幀計算 axis Y 位置（cache by frame）──
let _axisYCache = new Map();
let _axisYFrame = -1;
let _frameCounter = 0;

function getAxisYMap() {
  if (_axisYFrame === _frameCounter) return _axisYCache;
  const vis = getVisibleAxes();
  const gap = LANE_GAP_BASE * Math.max(1, yScale);
  const map = new Map();
  vis.forEach(([id], i) => {
    map.set(id, TOP_MARGIN + i * gap + yOffset);
  });
  _axisYCache = map;
  _axisYFrame = _frameCounter;
  return map;
}

function getAxisY(id) {
  return getAxisYMap().get(id) ?? (canvasH * 0.5 + yOffset);
}

// Events always sit exactly ON their axis line — sub_track ignored
function axisY(axisId, subtrack = 0) {
  return getAxisY(axisId);
}

function contentHeight() {
  const n = getVisibleAxes().length;
  const gap = LANE_GAP_BASE * Math.max(1, yScale);
  return TOP_MARGIN + n * gap + 100;
}
// ════════════════════════════════════════════
let events = [];
let viewStart = TIMELINE_START - (NOW - TIMELINE_START) / 0.80 * 0.10;
let viewEnd   = viewStart + (NOW - TIMELINE_START) / 0.80;
let yScale    = 1.0;
let yOffset   = 0;
let isDragging    = false;
let dragStartX    = 0;
let dragStartY    = 0;
let dragViewStart = 0;
let dragYOffset   = 0;
let hoveredEvent = null;
let mouseX = -1, mouseY = -1;
let canvasW = 0, canvasH = 0;
let dpr = window.devicePixelRatio || 1;
let hiddenAxes = new Set();
let lastFrameTime = 0;
let expandedEvents  = new Set();  // eventIds currently expanded
let hoveredPillId   = null;       // id of pill being hovered (shows ℹ button)
// _frameCounter declared above in AXES section
const starsCanvas = document.getElementById('stars-canvas');
const starsCtx = starsCanvas.getContext('2d');
const canvas = document.getElementById('timeline-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  dpr = window.devicePixelRatio || 1;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight;
  canvas.width  = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.scale(dpr, dpr);
  starsCanvas.width  = canvasW * dpr;
  starsCanvas.height = canvasH * dpr;
  starsCanvas.style.width  = canvasW + 'px';
  starsCanvas.style.height = canvasH + 'px';
  starsCtx.scale(dpr, dpr);
  drawStars();
}

// ════════════════════════════════════════════
//  STARS BACKGROUND
// ════════════════════════════════════════════
function drawStars() {
  starsCtx.clearRect(0, 0, canvasW, canvasH);
  const rng = mulberry32(42);
  for (let i = 0; i < 320; i++) {
    const x = rng() * canvasW;
    const y = rng() * canvasH;
    const r = rng() * 1.1 + 0.2;
    const a = rng() * 0.5 + 0.1;
    starsCtx.beginPath();
    starsCtx.arc(x, y, r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(255,255,255,${a})`;
    starsCtx.fill();
  }
}
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ════════════════════════════════════════════
//  COORDINATE HELPERS
// ════════════════════════════════════════════
function yearToX(year) {
  return ((year - viewStart) / (viewEnd - viewStart)) * canvasW;
}
function xToYear(x) {
  return viewStart + (x / canvasW) * (viewEnd - viewStart);
}
// ════════════════════════════════════════════
//  ZOOM LEVEL → event visibility
// ════════════════════════════════════════════
function currentZoom() {
  // 0 = fully zoomed out (138B yrs), 1 = max zoom
  const span = viewEnd - viewStart;
  const maxSpan = TOTAL_YEARS + NOW;
  return 1 - Math.log(span) / Math.log(maxSpan);
}
function eventVisible(ev) {
  const zoom = currentZoom();
  const ax = AXES[ev.axis];
  if (!ax) return false;
  if (hiddenAxes.has(ev.axis)) return false;
  if (ax.zoomMin > 0 && zoom < ax.zoomMin) return false;
  const checkEnd = zoom >= 0.58;
  if (checkEnd && ax.endYear != null && viewStart > ax.endYear + 50) return false;

  // Point events always visible (shrink but never disappear)
  if (!ev.endYear) return true;

  // Period pills: always show level 1
  if (ev.level === 1) return true;

  // For level 2/3 pills, use pixel width as the threshold instead of zoom.
  // A pill is worth showing if it's at least 8px wide on screen, OR
  // if zoom passes the original threshold — whichever comes first.
  if (ev.endYear) {
    const pixelW = Math.abs(yearToX(ev.endYear) - yearToX(ev.year));
    if (pixelW >= 8) return true;
  }
  if (ev.level === 2) return zoom > 0.10;
  if (ev.level === 3) return zoom > 0.55;
  return zoom > 0.7;
}

// Whether to show label for this event at current zoom
function labelVisible(ev) {
  const zoom = currentZoom();
  // For pills, show label if the pill is wide enough to hold text
  if (ev.endYear) {
    const pixelW = Math.abs(yearToX(ev.endYear) - yearToX(ev.year));
    if (pixelW >= 40) return true;  // wide enough → always show
    if (pixelW < 8)   return false; // too thin → never show
  }
  if (ev.level === 1) return true;
  if (ev.level === 2) return zoom > 0.20;
  if (ev.level === 3) return zoom > 0.55;
  return zoom > 0.7;
}

function dotRadius(ev) {
  const zoom = currentZoom();
  // Minimum 2px so dots never fully disappear
  const base = ev.level === 1 ? 6 : ev.level === 2 ? 4.5 : 3;
  return Math.max(2, base * Math.min(1, zoom * 3 + 0.3) + zoom * 1.5);
}

// ── Category colour system ──────────────────────
const CATEGORY_BROAD_COLORS = {
  natural: '#a78bfa',   // purple
  human:   '#f87171',   // red
};
const CATEGORY_COLORS = {
  astronomy:   '#a78bfa',  // purple
  geology:     '#60a5fa',  // blue
  biology:     '#34d399',  // green
  science:     '#fbbf24',  // yellow
  civilization:'#f87171',  // red
  politics:    '#fb923c',  // orange
  war:         '#ef4444',  // deep red
  religion:    '#f0abfc',  // pink-purple
  philosophy:  '#e2e8f0',  // white
  culture:     '#fda4af',  // pink
  exploration: '#fde68a',  // light yellow
  medicine:    '#86efac',  // light green
  math:        '#93c5fd',  // light blue
};

// Zoom thresholds for colour layers
const ZOOM_BROAD    = 0.25;   // < this → broad 2-colour
const ZOOM_CATEGORY = 0.55;   // < this → category 10-colour
                               // ≥ this → axis colour

// Highlighted category (for indicator clicks)
let highlightedCategory = null;

function eventColor(ev) {
  const zoom = currentZoom();
  const axisColor = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';
  if (zoom >= ZOOM_CATEGORY) return axisColor;
  if (zoom >= ZOOM_BROAD) {
    return CATEGORY_COLORS[ev.category] || axisColor;
  }
  return CATEGORY_BROAD_COLORS[ev.category_broad] || axisColor;
}

// Alpha modifier when a category is highlighted
function categoryAlpha(ev) {
  if (!highlightedCategory) return 1;
  const zoom = currentZoom();
  if (zoom >= ZOOM_CATEGORY) return 1;
  const match = zoom >= ZOOM_BROAD
    ? ev.category === highlightedCategory
    : ev.category_broad === highlightedCategory;
  return match ? 1 : 0.12;
}
function contentHeight() {
  const visCount = getVisibleAxes().length;
  const gap = LANE_GAP_BASE * Math.max(1, yScale);
  return TOP_MARGIN + visCount * gap + 80;
}

// ════════════════════════════════════════════
//  FORMAT YEAR
// ════════════════════════════════════════════
function formatYear(y) {
  const abs = Math.abs(y);
  if (y < 0) {
    if (abs >= 100_000_000) {           // ≥ 1億 → 億年前
      const v = abs / 1e9;              // in units of 10億
      const yi = abs / 1e8;             // in units of 1億
      // 138億: yi=138 → "138億", 13.8億: yi=13.8 → "13.8億", 5.4億: yi=5.4 → "5.4億"
      return (yi >= 100 ? yi.toFixed(0) : yi >= 10 ? yi.toFixed(1) : yi.toFixed(2)) + ' 億年前';
    }
    if (abs >= 10_000_000)   return (abs / 1e6).toFixed(0) + ' 百萬年前';
    if (abs >= 1_000_000)    return (abs / 1e6).toFixed(1) + ' 百萬年前';
    if (abs >= 10_000)       return (abs / 10000).toFixed(1) + ' 萬年前';
    if (abs >= 1_000)        return Math.round(abs / 1000) + ' 千年前';
    return `西元前 ${Math.round(abs)} 年`;
  }
  if (y === 0) return '西元元年';
  if (y > NOW) return `西元 ${Math.round(y)} 年（未來）`;
  return `西元 ${Math.round(y)} 年`;
}

function formatYearShort(y) {
  const abs = Math.abs(y);
  if (y < 0) {
    if (abs >= 100_000_000) {
      const yi = abs / 1e8;
      return (yi >= 100 ? yi.toFixed(0) : yi >= 10 ? yi.toFixed(1) : yi.toFixed(2)) + '億yr';
    }
    if (abs >= 1_000_000)    return (abs / 1e6).toFixed(0) + 'Myr';
    if (abs >= 10_000)       return (abs / 10000).toFixed(1) + '萬BC';
    if (abs >= 1_000)        return Math.round(abs / 1000) + 'K BC';
    return Math.round(abs) + ' BC';
  }
  if (y === 0) return 'AD 0';
  return 'AD ' + Math.round(y);
}

// ════════════════════════════════════════════
//  DRAW ERA BANDS — 高對比時代色塊
// ════════════════════════════════════════════
const ERA_BANDS = [
  { start:-13800000000, end:-4600000000, color:[120,50,220],  zh:'宇宙誕生',       en:'COSMIC DAWN'    },
  { start:-4600000000,  end:-541000000,  color:[30,80,200],   zh:'地球與生命',     en:'EARTH & LIFE'   },
  { start:-541000000,   end:-2600000,    color:[20,150,80],   zh:'複雜生命',       en:'COMPLEX LIFE'   },
  { start:-2600000,     end:-10000,      color:[180,140,10],  zh:'人類演化',       en:'HUMAN EVOLUTION'},
  { start:-10000,       end:-3000,       color:[200,80,20],   zh:'史前文明',       en:'PREHISTORIC'    },
  { start:-3000,        end:-500,        color:[200,50,40],   zh:'古代',           en:'ANCIENT'        },
  { start:-500,         end:500,         color:[160,40,90],   zh:'古典時代',       en:'CLASSICAL'      },
  { start:500,          end:1400,        color:[40,60,170],   zh:'中世紀',         en:'MEDIEVAL'       },
  { start:1400,         end:1800,        color:[80,40,160],   zh:'文藝復興·大航海', en:'RENAISSANCE'    },
  { start:1800,         end:1950,        color:[10,100,120],  zh:'工業時代',       en:'INDUSTRIAL'     },
  { start:1950,         end:2026,        color:[10,120,150],  zh:'當代',           en:'CONTEMPORARY'   },
];

function drawEraBands() {
  const zoom = currentZoom();
  ERA_BANDS.forEach(band => {
    const x1 = yearToX(band.start);
    const x2 = yearToX(band.end);
    if (x2 < -10 || x1 > canvasW + 10) return;
    const rx1 = Math.max(0, x1);
    const rx2 = Math.min(canvasW, x2);
    const w   = rx2 - rx1;
    if (w < 1) return;
    const [r,g,b] = band.color;

    // Background fill — always present, stronger when zoomed
    const fillAlpha = 0.08 + zoom * 0.1;
    ctx.fillStyle = `rgba(${r},${g},${b},${fillAlpha})`;
    ctx.fillRect(rx1, 0, w, canvasH);

    // Vertical border line at start of each era
    if (x1 > 2 && x1 < canvasW - 2) {
      ctx.beginPath();
      ctx.moveTo(x1, 0);
      ctx.lineTo(x1, canvasH);
      ctx.strokeStyle = `rgba(${r+80},${g+80},${b+80},${0.25 + zoom * 0.3})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.stroke();
    }

    // Era label banner — always visible regardless of zoom
    if (w > 30) {
      const cx = Math.max(rx1 + 6, Math.min(rx2 - 6, rx1 + w / 2));
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx1, 0, w, canvasH);
      ctx.clip();

      // Top colour accent strip
      ctx.fillStyle = `rgba(${r},${g},${b},${0.35 + zoom * 0.2})`;
      ctx.fillRect(rx1, 78, w, 32);

      // Chinese label
      const bigSz = Math.min(16, Math.max(10, w / 10));
      ctx.font = `700 ${bigSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = `rgba(255,255,255,0.92)`;
      ctx.textAlign = 'center';
      ctx.fillText(band.zh, cx, 93);

      // English sublabel
      if (w > 60) {
        ctx.font = `400 ${Math.max(8, bigSz - 4)}px "Noto Sans TC", sans-serif`;
        ctx.fillStyle = `rgba(255,255,255,0.55)`;
        ctx.fillText(band.en, cx, 93 + bigSz);
      }
      ctx.restore();
    }
  });
}

// ════════════════════════════════════════════
//  DRAW AXIS LINES
// ════════════════════════════════════════════
function drawAxisLines() {
  const yMap    = getAxisYMap();
  const visAxes = getVisibleAxes();
  const zoom    = currentZoom();

  // ── Pass 1: branch curves (drawn UNDER the axis lines) ──
  visAxes.forEach(([id, ax]) => {
    if (!ax.parent) return;
    const parentAx = AXES[ax.parent];
    if (!parentAx) return;
    if (!yMap.has(ax.parent)) return;

    const y       = yMap.get(id);
    const parentY = yMap.get(ax.parent);
    if (Math.abs(y - parentY) < 3) return;

    const startX  = yearToX(ax.startYear);
    if (startX > canvasW + 60) return;

    const alpha   = subAxisAlpha(ax);
    const color   = ax.color;
    const forkX   = Math.max(-80, startX);
    const dy      = y - parentY;

    // Corner radius — smaller when dy is small
    const r = Math.min(Math.abs(dy) * 0.45, 18);

    const nowX    = yearToX(NOW);
    const tailEnd = Math.min(forkX + r * 2.5, nowX);

    ctx.save();
    ctx.globalAlpha = alpha * 0.75;
    ctx.strokeStyle = color;
    ctx.lineWidth   = ax.zoomMin > 0 ? 1.0 : 1.4;
    ctx.setLineDash([]);
    ctx.beginPath();

    if (dy > 0) {
      ctx.moveTo(forkX, parentY);
      ctx.lineTo(forkX, y - r);
      ctx.arcTo(forkX, y, forkX + r, y, r);
      ctx.lineTo(tailEnd, y);
    } else {
      ctx.moveTo(forkX, parentY);
      ctx.lineTo(forkX, y + r);
      ctx.arcTo(forkX, y, forkX + r, y, r);
      ctx.lineTo(tailEnd, y);
    }
    ctx.stroke();

    // Fork dot on parent line
    if (forkX > -10 && forkX < canvasW + 10) {
      ctx.beginPath();
      ctx.arc(forkX, parentY, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha * 0.9;
      ctx.fill();
    }
    ctx.restore();
  });

  // ── Pass 2: axis lines — start from branch landing point ──
  visAxes.forEach(([id, ax]) => {
    const y      = yMap.get(id);
    const color  = ax.color;
    const startX = yearToX(ax.startYear);
    // For open-ended axes, cap at FUTURE_END pixel (not canvasW+20 which ignores NOW)
    const axEndYear = ax.endYear != null ? ax.endYear : FUTURE_END;
    const endX   = yearToX(axEndYear);

    if (startX > canvasW || endX < 0) return;

    let lineFrom;
    if (ax.parent && yMap.has(ax.parent)) {
      const parentY = yMap.get(ax.parent);
      const dy      = y - parentY;
      const r       = Math.min(Math.abs(dy) * 0.45, 18);
      const forkX   = Math.max(-80, startX);
      const nowX2   = yearToX(NOW);
      // Line starts right after the corner, but never past NOW
      lineFrom = Math.max(0, Math.min(forkX + r * 2.5, nowX2));
    } else {
      lineFrom = Math.max(0, startX);
    }

    const lineTo = Math.min(canvasW + 20, endX);

    // Alpha — sub-axis fade in, human-evo fade out, ended civilisations fade out
    let alpha = ax.zoomMin > 0 ? subAxisAlpha(ax) * 0.8 : 0.65;
    if (id === 'human-evo') alpha *= humanEvoAlpha();

    ctx.save();
    ctx.globalAlpha = alpha;

    // If the real startX is off-screen to the right, draw a dashed stub from
    // the left edge so the label and line are always visible at any zoom
    if (lineFrom > canvasW - 120 && startX > canvasW * 0.85) {
      // Draw short stub on left as placeholder
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(80, y);
      ctx.strokeStyle = color;
      ctx.lineWidth   = ax.zoomMin > 0 ? 1.1 : 1.6;
      ctx.globalAlpha = alpha * 0.35;
      ctx.setLineDash([3, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = alpha;
    }

    const nowX  = yearToX(NOW);
    // Clamp solid line to NOW (or endYear if earlier)
    const solidTo = Math.min(lineTo, nowX);

    ctx.beginPath();
    ctx.moveTo(lineFrom, y);
    ctx.lineTo(solidTo, y);
    ctx.strokeStyle = color;
    ctx.lineWidth   = ax.zoomMin > 0 ? 1.1 : 1.6;
    ctx.setLineDash([]);
    ctx.stroke();

    // Future portion — only draw if this axis has events after NOW
    const hasFutureEvents = events.some(ev => ev.axis === id && ev.year > NOW);
    if (hasFutureEvents && nowX < lineTo && nowX < canvasW) {
      ctx.beginPath();
      ctx.moveTo(Math.max(nowX, lineFrom), y);
      ctx.lineTo(lineTo, y);
      ctx.strokeStyle = color;
      ctx.lineWidth   = ax.zoomMin > 0 ? 0.9 : 1.2;
      ctx.globalAlpha = alpha * 0.35;
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = alpha;
    }

    // Ended civilisation — dashed tail after endYear
    if (ax.endYear != null) {
      const fadeX = yearToX(ax.endYear);
      if (fadeX < canvasW && fadeX > 0) {
        ctx.beginPath();
        ctx.moveTo(fadeX, y);
        ctx.lineTo(Math.min(canvasW, fadeX + 60), y);
        ctx.strokeStyle = color;
        ctx.lineWidth   = 0.8;
        ctx.globalAlpha = alpha * 0.25;
        ctx.setLineDash([3, 6]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.restore();

    // ── Label badge — always pinned to left edge for readability ──
    // When axis starts off-screen right, label still shows on left
    const labelX    = 4;
    const label     = ax.label;
    const fontSize  = ax.zoomMin > 0 ? 9 : 10;
    const pad       = 5;
    const labelAlpha = ax.zoomMin > 0 ? subAxisAlpha(ax) : 1;
    if (labelAlpha < 0.05) return;

    ctx.save();
    ctx.globalAlpha = labelAlpha;
    ctx.font = `500 ${fontSize}px "Noto Sans TC", sans-serif`;
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(5,8,16,0.88)';
    ctx.beginPath();
    ctx.roundRect(labelX, y - 10, tw + pad * 2, 13, 3);
    ctx.fill();
    ctx.strokeStyle = color + '66';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.textAlign = 'left';
    ctx.fillText(label, labelX + pad, y - 1);
    ctx.restore();
  });
}

// ════════════════════════════════════════════
//  DRAW TIME RULER
// ════════════════════════════════════════════
function drawRuler() {
  const span = viewEnd - viewStart;

  // ── Tick marks along bottom ──
  const targets = [
    1e10, 5e9, 2e9, 1e9, 5e8, 2e8, 1e8,
    5e7, 2e7, 1e7, 5e6, 1e6, 5e5, 1e5,
    1e4, 5e3, 1e3, 500, 200, 100, 50, 10, 5, 1
  ];
  let step = targets.find(t => span / t < 10) || 1e10;
  const startTick = Math.ceil(viewStart / step) * step;
  const rulerY = canvasH - 44;

  // Ruler base line
  ctx.beginPath();
  ctx.moveTo(0, rulerY);
  ctx.lineTo(canvasW, rulerY);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.stroke();

  ctx.font = '9px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(221,216,200,0.35)';
  ctx.textAlign = 'center';

  for (let y = startTick; y <= viewEnd; y += step) {
    const x = yearToX(y);
    if (x < 10 || x > canvasW - 10) continue;
    ctx.beginPath();
    ctx.moveTo(x, rulerY);
    ctx.lineTo(x, rulerY + 7);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillText(formatYearShort(y), x, rulerY + 18);
  }

  // ── Scale bar (bottom-left) ──
  // Pick a nice round number whose pixel width is 60–200px
  const niceSteps = [1e10,5e9,2e9,1e9,5e8,2e8,1e8,5e7,2e7,1e7,5e6,1e6,
                     5e5,1e5,5e4,1e4,5e3,1e3,500,200,100,50,20,10,5,2,1];
  let scaleYears = niceSteps.find(s => {
    const px = (s / span) * canvasW;
    return px >= 60 && px <= 200;
  }) || step;
  const scalePx = Math.round((scaleYears / span) * canvasW);

  // Update DOM scale bar
  document.getElementById('scale-line').style.width = scalePx + 'px';
  document.getElementById('scale-label').textContent = formatScaleBar(scaleYears);
}

function formatScaleBar(years) {
  const abs = Math.abs(years);
  if (abs >= 1e9) return (abs / 1e9).toFixed(abs >= 5e9 ? 0 : 1) + ' 億年';
  if (abs >= 1e6) return (abs / 1e6).toFixed(abs >= 5e6 ? 0 : 1) + ' 百萬年';
  if (abs >= 1e3) return (abs / 1e3).toFixed(0) + ' 千年';
  return abs + ' 年';
}

// ════════════════════════════════════════════
//  DRAW BRANCH LINES (parallel events)
// ════════════════════════════════════════════
function drawBranchLines(eventsInView) {
  // Group events with same parallel_group
  const groups = {};
  eventsInView.forEach(ev => {
    if (ev.parallel_group) {
      if (!groups[ev.parallel_group]) groups[ev.parallel_group] = [];
      groups[ev.parallel_group].push(ev);
    }
  });

  Object.values(groups).forEach(group => {
    if (group.length < 2) return;
    const sorted = group.sort((a, b) => a.year - b.year);
    const startX = yearToX(sorted[0].year);
    const endX   = yearToX(sorted[sorted.length - 1].year);
    const baseY  = axisY(sorted[0].axis, sorted[0].sub_track || 0);

    ctx.save();
    ctx.strokeStyle = (( AXES[sorted[0].axis] && AXES[sorted[0].axis].color ) || '#fff' || '#fff') + '30';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    ctx.beginPath();
    ctx.moveTo(startX, baseY);
    ctx.lineTo(endX, baseY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });
}


// ════════════════════════════════════════════
//  LABEL COLLISION REGISTRY  (reset each frame)
// ════════════════════════════════════════════
let _labelReg = [];

function _regClear() { _labelReg = []; }

function _regTest(x1, y1, x2, y2) {
  for (const r of _labelReg) {
    if (x1 < r.x2 + 2 && x2 > r.x1 - 2 && y1 < r.y2 + 2 && y2 > r.y1 - 2) return true;
  }
  return false;
}

function _regAdd(x1, y1, x2, y2) { _labelReg.push({x1, y1, x2, y2}); }

// Try to place label at prefY; if blocked try alternates. Returns placed Y or null.
function _tryPlace(cx, prefY, tw, th, alts) {
  const hw = tw / 2 + 4;
  for (const dy of [0, ...alts]) {
    const y = prefY + dy;
    if (!_regTest(cx - hw, y - th, cx + hw, y + 2)) {
      _regAdd(cx - hw, y - th, cx + hw, y + 2);
      return y;
    }
  }
  return null;
}


// ════════════════════════════════════════════
//  HELPERS: child-event lookup
// ════════════════════════════════════════════
function getChildEvents(parentId) {
  return events.filter(e => resolvedParent(e) === parentId && e.endYear);
}

function hasChildren(ev) {
  // Only period events (with endYear) count as expandable children
  return events.some(e => resolvedParent(e) === ev.id && e.endYear);
}

// Y offset for an expanded child row below its parent
const EXPAND_ROW_H = 36;

function childRowY(parentY, depth) {
  return parentY + depth * EXPAND_ROW_H * Math.max(1, yScale);
}

// Compute vertical offset for pills on the same axis that partially overlap
// Returns a Map<eventId, offsetPx>
let _pillOffsetCache = null;
let _pillOffsetFrame = -2;

function getPillOffsets() {
  if (_pillOffsetFrame === _frameCounter) return _pillOffsetCache;
  const map = new Map();

  // Group ROOT pills by axis (exclude children — they render under parent)
  const byAxis = {};
  events.forEach(ev => {
    if (!ev.endYear || !eventVisible(ev)) return;
    if (resolvedParent(ev)) return;   // children handled by parent expand
    if (!byAxis[ev.axis]) byAxis[ev.axis] = [];
    byAxis[ev.axis].push(ev);
  });

  const PILL_H = 10;
  const OFFSET = PILL_H * 2 + 6;

  Object.values(byAxis).forEach(pills => {
    pills.sort((a, b) => a.year - b.year);
    // Row assignment: rows[i] = endYear of last pill in that row
    const rowEnds = [];
    pills.forEach(ev => {
      let placed = false;
      for (let row = 0; row < rowEnds.length; row++) {
        if (ev.year >= rowEnds[row]) {
          rowEnds[row] = ev.endYear;
          map.set(ev.id, row * OFFSET);
          placed = true;
          break;
        }
      }
      if (!placed) {
        map.set(ev.id, rowEnds.length * OFFSET);
        rowEnds.push(ev.endYear);
      }
    });
  });

  _pillOffsetCache = map;
  _pillOffsetFrame = _frameCounter;
  return map;
}

// ════════════════════════════════════════════
//  DRAW A SINGLE PILL  (reusable)
// ════════════════════════════════════════════
function drawPill(ev, y, opts = {}) {
  const { depth = 0, isChild = false } = opts;
  const zoom    = currentZoom();
  const x1      = yearToX(ev.year);
  const x2      = yearToX(ev.endYear);
  if (x2 < -10 || x1 > canvasW + 10) return;

  const color   = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';
  const isHov   = hoveredPillId === ev.id;
  const isExp   = expandedEvents.has(ev.id);
  const hasKids = hasChildren(ev);
  const rx1     = Math.max(-40, x1);
  const rx2     = Math.min(canvasW + 40, x2);
  const w       = rx2 - rx1;
  if (w < 2) return;

  // Pill height — children are slightly shorter
  const baseH = isChild ? 7 : Math.max(5, Math.min(10, 5 + zoom * 8));
  const pillH = isHov ? baseH + 2 : baseH;
  const r     = Math.min(pillH, w / 2);

  ctx.save();

  // ── Pill fill ──
  ctx.beginPath();
  ctx.roundRect(rx1, y - pillH, w, pillH * 2, r);
  ctx.fillStyle = color;
  ctx.globalAlpha = isHov ? 0.60 : (isChild ? 0.28 : 0.35);
  ctx.fill();

  // ── Pill border — thicker if expandable ──
  ctx.strokeStyle = color;
  ctx.lineWidth   = isHov ? 2 : (hasKids ? 2 : 1);
  ctx.globalAlpha = isHov ? 0.95 : (hasKids ? 0.85 : (isChild ? 0.55 : 0.65));
  ctx.stroke();

  // ── Centre spine ──
  ctx.beginPath();
  ctx.moveTo(rx1 + r, y);
  ctx.lineTo(rx2 - r, y);
  ctx.strokeStyle = color;
  ctx.lineWidth   = isHov ? 2 : 1.5;
  ctx.globalAlpha = isHov ? 1 : 0.8;
  ctx.stroke();

  ctx.restore();

  // ── ℹ button (hover only) — placed inside pill, left of right edge ──
  if (isHov) {
    const infoR = 7;
    // Place ℹ at right edge of VISIBLE pill area, with enough gap from edge
    const infoX = Math.min(rx2 - infoR - 6, canvasW - infoR - 8);
    const infoY = y;
    ctx.save();
    ctx.beginPath();
    ctx.arc(infoX, infoY, infoR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(5,8,16,0.90)';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.9;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.font = `bold 9px "Noto Sans TC", sans-serif`;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('i', infoX, infoY + 0.5);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // ── Label — always show for child pills; use zoom threshold for others ──
  const showLabel = isChild || ev.level === 1 || zoom > 0.20;
  if (showLabel) {
    ctx.save();
    const fs      = isChild ? 10 : (ev.level === 1 ? 11 : 10);
    const infoGap = isHov ? 22 : 0;
    ctx.font      = `${ev.level === 1 && !isChild ? '500 ' : ''}${fs}px "Noto Sans TC", sans-serif`;
    const tw      = ctx.measureText(ev.zh).width;
    const midX    = (rx1 + rx2) / 2;
    const cx      = Math.max(tw / 2 + 4, Math.min(rx2 - tw / 2 - infoGap - 4, midX));
    const inside  = w > tw + 16 + infoGap;
    const prefY   = inside ? y + fs * 0.35 : y - pillH - 5;
    const alts    = inside ? [] : [-14, 14, -28, 28];
    const py      = _tryPlace(cx, prefY, tw, fs + 4, alts);

    if (py !== null) {
      if (!inside || py !== prefY) {
        ctx.fillStyle = 'rgba(5,8,16,0.80)';
        ctx.beginPath();
        ctx.roundRect(cx - tw / 2 - 4, py - fs, tw + 8, fs + 3, 3);
        ctx.fill();
      }
      ctx.fillStyle = isHov ? color : (inside && py === prefY
        ? `rgba(255,255,255,${isChild ? 0.85 : ev.level === 1 ? 0.9 : 0.75})`
        : `rgba(221,216,200,${ev.level === 1 ? 0.9 : 0.65})`);
      ctx.textAlign = 'center';
      ctx.fillText(ev.zh, cx, py);
    }
    ctx.restore();
  }

  // ── Recurse: draw expanded children ──
  if (isExp && hasKids) {
    const children = getChildEvents(ev.id);
    const childY   = childRowY(y, 1);

    // Gradient band connecting parent to children
    const bx1 = Math.max(0, x1);
    const bx2 = Math.min(canvasW, x2);
    const bw  = bx2 - bx1;
    if (bw > 0) {
      ctx.save();
      const grad = ctx.createLinearGradient(bx1, y + pillH, bx1, childY - 7);
      const [rc, gc, bc] = hexToRgb(color);
      grad.addColorStop(0,   `rgba(${rc},${gc},${bc},0.18)`);
      grad.addColorStop(1,   `rgba(${rc},${gc},${bc},0.06)`);
      ctx.fillStyle = grad;
      ctx.fillRect(bx1, y + pillH, bw, childY - 7 - (y + pillH));
      ctx.restore();
    }

    // Draw child pills
    children.forEach(child => {
      if (eventVisible(child)) drawPill(child, childY, { depth: 1, isChild: true });
    });
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

// ════════════════════════════════════════════
//  DRAW EVENTS — points + period blocks
// ════════════════════════════════════════════
function drawEvents(eventsInView) {
  const zoom = currentZoom();
  _regClear();

  // Sort: level 1 first
  const sorted = [...eventsInView].sort((a, b) => (a.level||3) - (b.level||3));

  // ── Pass 1: period pills (skip children — they're drawn by their parent) ──
  const offsets = getPillOffsets();
  sorted.forEach(ev => {
    if (!eventVisible(ev)) return;
    if (!ev.endYear) return;
    if (resolvedParent(ev)) return;   // drawn by parent's expand logic

    const baseY  = axisY(ev.axis);
    const offset = offsets.get(ev.id) ?? 0;
    drawPill(ev, baseY + offset, { depth: 0, isChild: false });
  });

  // ── Pass 2: point events — with cluster detection ──
  // Group nearby dots on the same axis into clusters
  const CLUSTER_PX = 12;  // px threshold to merge into cluster

  // Build clusters per axis
  const axisGroups = {};
  sorted.forEach(ev => {
    if (!eventVisible(ev)) return;
    if (ev.endYear) return;
    const x = yearToX(ev.year);
    if (x < -20 || x > canvasW + 20) return;
    if (!axisGroups[ev.axis]) axisGroups[ev.axis] = [];
    axisGroups[ev.axis].push({ ev, x });
  });

  // For each axis, merge events within CLUSTER_PX of each other
  const clusters = [];    // { events[], x, y, axis }
  const clustered = new Set();

  Object.entries(axisGroups).forEach(([axis, items]) => {
    items.sort((a, b) => a.x - b.x);
    items.forEach((item, i) => {
      if (clustered.has(item.ev.id)) return;
      const group = [item];
      clustered.add(item.ev.id);
      // Merge nearby items
      for (let j = i + 1; j < items.length; j++) {
        if (clustered.has(items[j].ev.id)) continue;
        if (Math.abs(items[j].x - item.x) <= CLUSTER_PX) {
          group.push(items[j]);
          clustered.add(items[j].ev.id);
        }
      }
      const cx = group.reduce((s, g) => s + g.x, 0) / group.length;
      clusters.push({ events: group.map(g => g.ev), x: cx,
                      y: axisY(axis), axis });
    });
  });

  // Draw each cluster
  clusters.forEach(cl => {
    const { events: evs, x, y, axis } = cl;
    const isCluster = evs.length > 1;
    const rep     = evs.reduce((a, b) => (a.level||3) <= (b.level||3) ? a : b);
    const color   = eventColor(rep);
    const axisCol = (AXES[axis] && AXES[axis].color) || '#fff';
    const isHov   = evs.some(e => hoveredEvent && hoveredEvent.id === e.id);
    const r       = dotRadius(rep);
    const catA    = categoryAlpha(rep);

    ctx.save();
    ctx.globalAlpha = catA;

    // Connector to ruler (level 1 only, when zoomed in enough)
    if (rep.level === 1 && zoom > 0.1) {
      ctx.beginPath();
      ctx.moveTo(x, y + r);
      ctx.lineTo(x, canvasH - 38);
      ctx.strokeStyle = color + '18';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Glow for hovered or level 1
    if (isHov || rep.level === 1) {
      ctx.beginPath();
      ctx.arc(x, y, r + (isHov ? 8 : 4), 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r + (isHov ? 8 : 4));
      grad.addColorStop(0, color + '40');
      grad.addColorStop(1, color + '00');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Main dot
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = isHov ? color : color + 'cc';
    ctx.fill();

    // Inner ring for level 1 solo events
    if (!isCluster && rep.level === 1) {
      ctx.beginPath();
      ctx.arc(x, y, r + 2, 0, Math.PI * 2);
      ctx.strokeStyle = color + '55';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Cluster indicator: outer ring + count
    if (isCluster) {
      const ringR = r + 4;
      ctx.beginPath();
      ctx.arc(x, y, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth   = isHov ? 1.5 : 1;
      ctx.globalAlpha = catA * (isHov ? 0.9 : 0.6);
      ctx.stroke();
      ctx.globalAlpha = catA;
      if (evs.length > 2 && r >= 3) {
        ctx.font = `bold ${Math.max(8, Math.round(r * 1.1))}px sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(evs.length, x, y);
        ctx.textBaseline = 'alphabetic';
      }
    }

    ctx.restore();

    // Label — only when zoomed in enough and not a cluster
    if (!isCluster && labelVisible(rep)) {
      ctx.save();
      const fs = rep.level === 1 ? 11 : 10;
      ctx.font = rep.level === 1 ? '500 11px "Noto Sans TC", sans-serif' : '10px "Noto Sans TC", sans-serif';
      const tw  = ctx.measureText(rep.zh).width;
      const py  = _tryPlace(x, y - r - 8, tw, fs + 4, [-13, 13, -26, 26, -39]);
      if (py !== null) {
        ctx.fillStyle = 'rgba(5,8,16,0.72)';
        ctx.beginPath();
        ctx.roundRect(x - tw / 2 - 4, py - fs, tw + 8, fs + 3, 3);
        ctx.fill();
        ctx.fillStyle = isHov ? color : `rgba(221,216,200,${rep.level === 1 ? 0.88 : 0.60})`;
        ctx.textAlign = 'center';
        ctx.fillText(rep.zh, x, py);
      }
      ctx.restore();
    }
  });

  // ── Pass 3: crossRef lines — vertical connector to target axis ──
  // Only show when zoomed in enough (otherwise too cluttered)
  if (zoom >= 0.55) {
    sorted.forEach(ev => {
      if (!ev.crossRef) return;
      if (!eventVisible(ev)) return;
      if (ev.endYear) return;  // only point events

      const targetAx = AXES[ev.crossRef];
      if (!targetAx) return;
      if (hiddenAxes.has(ev.crossRef)) return;
      if (hiddenAxes.has(ev.axis)) return;

      const x      = yearToX(ev.year);
      if (x < -20 || x > canvasW + 20) return;

      const y1     = axisY(ev.axis);
      const y2     = axisY(ev.crossRef);
      if (Math.abs(y1 - y2) < 4) return;

      const color  = eventColor(ev);
      const catA   = categoryAlpha(ev);
      const r      = dotRadius(ev);
      const isHov  = hoveredEvent && hoveredEvent.id === ev.id;

      ctx.save();
      ctx.globalAlpha = catA * (isHov ? 0.7 : 0.35);

      // Vertical dashed line between the two axes
      ctx.beginPath();
      ctx.moveTo(x, Math.min(y1, y2) + r);
      ctx.lineTo(x, Math.max(y1, y2) - r);
      ctx.strokeStyle = color;
      ctx.lineWidth   = isHov ? 1.5 : 1;
      ctx.setLineDash([3, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Hollow circle on target axis
      ctx.globalAlpha = catA * (isHov ? 0.9 : 0.55);
      ctx.beginPath();
      ctx.arc(x, y2, r * 0.85, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth   = isHov ? 2 : 1.5;
      ctx.stroke();

      // Small filled dot in center of hollow circle
      ctx.beginPath();
      ctx.arc(x, y2, r * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = catA * (isHov ? 0.9 : 0.5);
      ctx.fill();

      ctx.restore();
    });
  }
}

// ════════════════════════════════════════════
//  DRAW FUTURE ZONE  (NOW → NOW+500)
// ════════════════════════════════════════════
function drawFutureZone() {
  const x1 = yearToX(NOW);
  const x2 = yearToX(FUTURE_END);
  if (x2 < 0 || x1 > canvasW) return;
  const rx1 = Math.max(0, x1);
  const rx2 = Math.min(canvasW, x2);

  // Light grey wash
  ctx.fillStyle = 'rgba(200,210,220,0.07)';
  ctx.fillRect(rx1, 0, rx2 - rx1, canvasH);

  // Left boundary line
  if (x1 > 0 && x1 < canvasW) {
    ctx.beginPath();
    ctx.moveTo(x1, 0);
    ctx.lineTo(x1, canvasH);
    ctx.strokeStyle = 'rgba(200,210,220,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    // "今日" label
    ctx.font = '500 10px "Noto Sans TC", sans-serif';
    ctx.fillStyle = 'rgba(200,210,220,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText('今日', x1, 158);
  }

  // Right hard boundary
  if (x2 > 0 && x2 < canvasW) {
    ctx.beginPath();
    ctx.moveTo(x2, 0);
    ctx.lineTo(x2, canvasH);
    ctx.strokeStyle = 'rgba(200,210,220,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = '500 10px "Noto Sans TC", sans-serif';
    ctx.fillStyle = 'rgba(200,210,220,0.35)';
    ctx.textAlign = 'center';
    ctx.fillText('未來 500 年', x2 - 30, 158);
  }
}

// ════════════════════════════════════════════
//  MAIN DRAW
// ════════════════════════════════════════════
function draw() {
  _frameCounter++;
  ctx.clearRect(0, 0, canvasW, canvasH);

  drawEraBands();
  drawFutureZone();
  drawAxisLines();

  // Include events in view, plus children of visible expanded parents
  const visSet = new Set();
  events.forEach(ev => {
    const x = yearToX(ev.year);
    if (x > -100 && x < canvasW + 100) visSet.add(ev.id);
    // Also include if it's an endYear pill partially in view
    if (ev.endYear) {
      const x2 = yearToX(ev.endYear);
      if (x2 > -100 && x < canvasW + 100) visSet.add(ev.id);
    }
  });
  // Include children of expanded parents even if off-screen
  expandedEvents.forEach(parentId => {
    events.filter(e => resolvedParent(e) === parentId && e.endYear)
      .forEach(child => visSet.add(child.id));
  });
  const vis = events.filter(ev => visSet.has(ev.id));

  drawBranchLines(vis);
  drawEvents(vis);
  drawRuler();
  drawCursorLine();  // ← 游標縱線

  // Time display
  const midYear = (viewStart + viewEnd) / 2;
  document.getElementById('time-display').textContent = formatYear(midYear);

  // Sync zoom slider — 0 = global view (max zoom out), 100 = max zoom in
  const maxSpan = globalViewSpan();
  const curSpan = viewEnd - viewStart;
  const logMin  = Math.log(2);
  const logMax  = Math.log(maxSpan);
  const logCur  = Math.log(Math.max(2, curSpan));
  const sliderVal = Math.round(100 * (1 - (logCur - logMin) / (logMax - logMin)));
  const sl = document.getElementById('zoom-slider');
  if (!sl._dragging) sl.value = Math.max(0, Math.min(100, sliderVal));

  // Sync Y zoom slider
  const yzsl = document.getElementById('yzoom-slider');
  if (!yzsl._dragging) yzsl.value = Math.round(yScale * 100);

  updateScrollbar();
  updateVScrollbar();
}

// ════════════════════════════════════════════
//  CURSOR VERTICAL LINE
// ════════════════════════════════════════════
function drawCursorLine() {
  if (mouseX < 0 || isDragging) return;
  const rulerY = canvasH - 44;

  // Vertical line
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(mouseX, 78);
  ctx.lineTo(mouseX, rulerY);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Year label at top of line
  const year = xToYear(mouseX);
  const label = formatYear(year);
  ctx.font = '500 10px "Noto Sans TC", sans-serif';
  const tw = ctx.measureText(label).width;
  const lx = Math.max(tw / 2 + 6, Math.min(canvasW - tw / 2 - 6, mouseX));
  const ly = 100;

  // Label background pill
  ctx.fillStyle = 'rgba(5,8,16,0.85)';
  ctx.beginPath();
  ctx.roundRect(lx - tw / 2 - 7, ly - 13, tw + 14, 17, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Label text
  ctx.fillStyle = 'rgba(221,216,200,0.85)';
  ctx.textAlign = 'center';
  ctx.fillText(label, lx, ly);
  ctx.restore();
}

// ════════════════════════════════════════════
//  VERTICAL SCROLLBAR SYNC
// ════════════════════════════════════════════
function clampYOffset() {
  const ch = contentHeight();
  const visible = canvasH - 140;
  const maxScroll = Math.max(0, ch - visible);
  yOffset = Math.max(-maxScroll, Math.min(0, yOffset));
}

function updateVScrollbar() {
  const track = document.getElementById('vscroll-track');
  const thumb = document.getElementById('vscroll-thumb');
  if (!track || !thumb) return;
  const trackH = track.clientHeight;
  const ch = contentHeight();
  const visible = canvasH - 140;

  if (ch <= visible) {
    thumb.style.height = trackH + 'px';
    thumb.style.top = '0px';
    return;
  }
  const thumbH = Math.max(20, Math.min(trackH - 4, (visible / ch) * trackH));
  const maxScroll = ch - visible;
  const scrollFrac = (-yOffset) / maxScroll;
  const thumbTop = scrollFrac * (trackH - thumbH);
  thumb.style.height = thumbH + 'px';
  thumb.style.top = thumbTop + 'px';
}
function updateScrollbar() {
  const fullRange  = FUTURE_END - TIMELINE_START;
  const curSpan    = viewEnd - viewStart;
  const track = document.getElementById('scrollbar-track');
  const thumb = document.getElementById('scrollbar-thumb');
  if (!track || !thumb) return;
  const trackW = track.clientWidth;
  const thumbW   = Math.max(24, Math.min(trackW - 4, (curSpan / fullRange) * trackW));
  const maxPan   = fullRange - curSpan;
  const panFrac  = maxPan > 0 ? Math.max(0, Math.min(1, (viewStart - TIMELINE_START) / maxPan)) : 0;
  const thumbLeft = panFrac * (trackW - thumbW);
  thumb.style.width = thumbW + 'px';
  thumb.style.left  = thumbLeft + 'px';
}

// ════════════════════════════════════════════
//  PAN & ZOOM HELPERS
// ════════════════════════════════════════════

// The "global view": big bang → today fits in 80% of screen width
// Meaning the view span = (TODAY - BIG_BANG) / 0.80
function globalViewSpan() {
  return (NOW - TIMELINE_START) / 0.80;
}

function globalView(animate) {
  // Center so that big bang is at left 10% and today is at right 90%
  const span  = globalViewSpan();
  const tStart = TIMELINE_START - span * 0.10;
  const tEnd   = tStart + span;
  if (animate) {
    jumpTo(tStart, tEnd - span * 0.30); // jumpTo adds padding, so adjust
  } else {
    viewStart = tStart;
    viewEnd   = tEnd;
    clampView();
    draw();
  }
}

// Hard boundary clamp — big bang at left 10%, future end never past screen centre
function clampView() {
  const span = viewStart === viewEnd ? 1 : viewEnd - viewStart;
  const half = span / 2;
  const maxSpan = globalViewSpan();

  // Enforce max zoom out
  if (span > maxSpan) {
    const mid = (viewStart + viewEnd) / 2;
    viewStart = mid - maxSpan / 2;
    viewEnd   = mid + maxSpan / 2;
  }

  // Left limit: big bang never goes past left 10% of screen
  // i.e. viewStart >= TIMELINE_START - span * 0.10
  const leftLimit = TIMELINE_START - (viewEnd - viewStart) * 0.10;
  // Right limit: FUTURE_END never past screen centre
  const rightLimit = FUTURE_END + half;

  if (viewStart < leftLimit) {
    viewStart = leftLimit;
    viewEnd   = viewStart + span;
  }
  if (viewEnd > rightLimit) {
    viewEnd   = rightLimit;
    viewStart = viewEnd - span;
  }
}

function panBy(fraction) {
  const span = viewEnd - viewStart;
  const shift = span * fraction;
  viewStart += shift;
  viewEnd   += shift;
  clampView();
  draw();
}

function zoomBy(factor, centerX) {
  const cx = centerX !== undefined ? centerX : canvasW / 2;
  const mouseYear = xToYear(cx);
  const span = viewEnd - viewStart;
  let newSpan = span * factor;
  newSpan = Math.min(Math.max(newSpan, 2), globalViewSpan());
  const ratio = (mouseYear - viewStart) / span;
  viewStart = mouseYear - ratio * newSpan;
  viewEnd   = viewStart + newSpan;
  clampView();
  draw();
}

function zoomToSpan(newSpan) {
  const mid = (viewStart + viewEnd) / 2;
  newSpan = Math.max(2, Math.min(globalViewSpan(), newSpan));
  viewStart = mid - newSpan / 2;
  viewEnd   = mid + newSpan / 2;
  clampView();
  draw();
}

// Jump to a specific time range with smooth animation
function jumpTo(start, end) {
  const padding = (end - start) * 0.15;
  const targetStart = start - padding;
  const targetEnd   = end   + padding;

  // Animate over ~400ms
  const fromStart = viewStart;
  const fromEnd   = viewEnd;
  const t0 = performance.now();
  const dur = 420;

  function step(now) {
    const t = Math.min(1, (now - t0) / dur);
    // Ease in-out cubic
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    viewStart = fromStart + (targetStart - fromStart) * e;
    viewEnd   = fromEnd   + (targetEnd   - fromEnd)   * e;
    clampView();
    draw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ════════════════════════════════════════════
//  Y ZOOM SLIDER
// ════════════════════════════════════════════
const yzoomSlider = document.getElementById('yzoom-slider');
yzoomSlider.addEventListener('input', () => {
  yzoomSlider._dragging = true;
  yScale = parseInt(yzoomSlider.value) / 100;
  clampYOffset();
  draw();
});
yzoomSlider.addEventListener('pointerup', () => { yzoomSlider._dragging = false; });
yzoomSlider.addEventListener('pointercancel', () => { yzoomSlider._dragging = false; });

// ════════════════════════════════════════════
//  VERTICAL SCROLLBAR DRAG
// ════════════════════════════════════════════
{
  const vtrack = document.getElementById('vscroll-track');
  const vthumb = document.getElementById('vscroll-thumb');
  let vDragging = false, vStartY = 0, vStartTop = 0;

  vthumb.addEventListener('pointerdown', e => {
    e.stopPropagation();
    vDragging = true;
    vStartY = e.clientY;
    vStartTop = parseFloat(vthumb.style.top) || 0;
    vthumb.classList.add('dragging');
    vthumb.setPointerCapture(e.pointerId);
  });

  vthumb.addEventListener('pointermove', e => {
    if (!vDragging) return;
    const trackH = vtrack.clientHeight;
    const thumbH = parseFloat(vthumb.style.height) || 20;
    const maxTop = trackH - thumbH;
    const newTop = Math.max(0, Math.min(maxTop, vStartTop + e.clientY - vStartY));
    const frac = maxTop > 0 ? newTop / maxTop : 0;
    const ch = contentHeight();
    const visible = canvasH - 140;
    const maxScroll = Math.max(0, ch - visible);
    yOffset = -(frac * maxScroll);
    draw();
  });

  vthumb.addEventListener('pointerup', () => {
    vDragging = false;
    vthumb.classList.remove('dragging');
  });

  // Click track to jump
  vtrack.addEventListener('pointerdown', e => {
    if (e.target === vthumb) return;
    const rect = vtrack.getBoundingClientRect();
    const frac = (e.clientY - rect.top) / rect.height;
    const ch = contentHeight();
    const visible = canvasH - 140;
    const maxScroll = Math.max(0, ch - visible);
    yOffset = -(frac * maxScroll);
    clampYOffset();
    draw();
  });
}

// ════════════════════════════════════════════
//  ZOOM SLIDER
// ════════════════════════════════════════════
const zoomSlider = document.getElementById('zoom-slider');
zoomSlider.addEventListener('input', () => {
  zoomSlider._dragging = true;
  const val    = parseInt(zoomSlider.value);
  const logMin = Math.log(2);
  const logMax = Math.log(globalViewSpan());
  const logTarget = logMax - (val / 100) * (logMax - logMin);
  zoomToSpan(Math.exp(logTarget));
});
zoomSlider.addEventListener('pointerup',    () => { zoomSlider._dragging = false; });
zoomSlider.addEventListener('pointercancel',() => { zoomSlider._dragging = false; });

// Reset button → full view + reset Y zoom + reset Y scroll
document.getElementById('btn-reset').addEventListener('click', () => {
  globalView(false);
  yScale  = 1.0;
  yOffset = 0;
  draw();
});

// ════════════════════════════════════════════
//  BOTTOM SCROLLBAR DRAG
// ════════════════════════════════════════════
{
  const track = document.getElementById('scrollbar-track');
  const thumb = document.getElementById('scrollbar-thumb');
  let sbDragging = false, sbStartX = 0, sbStartLeft = 0;

  thumb.addEventListener('pointerdown', e => {
    e.stopPropagation();
    sbDragging = true;
    sbStartX = e.clientX;
    sbStartLeft = parseFloat(thumb.style.left) || 0;
    thumb.classList.add('dragging');
    thumb.setPointerCapture(e.pointerId);
  });

  thumb.addEventListener('pointermove', e => {
    if (!sbDragging) return;
    const trackW  = track.clientWidth;
    const thumbW  = parseFloat(thumb.style.width) || 40;
    const maxLeft = trackW - thumbW;
    const newLeft = Math.max(0, Math.min(maxLeft, sbStartLeft + e.clientX - sbStartX));
    const frac = maxLeft > 0 ? newLeft / maxLeft : 0;

    const fullRange = FUTURE_END - TIMELINE_START;
    const curSpan   = viewEnd - viewStart;
    const maxPan    = fullRange - curSpan;
    viewStart = TIMELINE_START + frac * maxPan;
    viewEnd   = viewStart + curSpan;
    clampView();
    draw();
  });

  thumb.addEventListener('pointerup', () => {
    sbDragging = false;
    thumb.classList.remove('dragging');
  });

  // Click on track (not thumb) → jump
  track.addEventListener('pointerdown', e => {
    if (e.target === thumb) return;
    const rect = track.getBoundingClientRect();
    const clickFrac = (e.clientX - rect.left) / rect.width;
    const fullRange = FUTURE_END - TIMELINE_START;
    const curSpan   = viewEnd - viewStart;
    viewStart = TIMELINE_START + clickFrac * fullRange - curSpan / 2;
    viewEnd   = viewStart + curSpan;
    clampView();
    draw();
  });
}

// ════════════════════════════════════════════
//  KEYBOARD NAVIGATION
// ════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.getElementById('popup-overlay').classList.contains('show') && e.key !== 'Escape') return;
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); panBy(-0.2); break;
    case 'ArrowRight': e.preventDefault(); panBy( 0.2); break;
    case 'ArrowUp':    e.preventDefault(); yOffset += 60; clampYOffset(); draw(); break;
    case 'ArrowDown':  e.preventDefault(); yOffset -= 60; clampYOffset(); draw(); break;
    case '+': case '=': e.preventDefault(); zoomBy(0.6); break;
    case '-': case '_': e.preventDefault(); zoomBy(1.6); break;
    case 'Escape': document.getElementById('popup-overlay').classList.remove('show'); break;
  }
});

// ════════════════════════════════════════════
//  WHEEL — normal=H-zoom on cursor, Ctrl=V-zoom, Shift=V-scroll
// ════════════════════════════════════════════
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey) {
    // Ctrl+wheel → vertical zoom, keep mouseY fixed
    const factor = e.deltaY > 0 ? 1.15 : 0.87;
    const oldScale = yScale;
    yScale = Math.max(0.3, Math.min(4.0, yScale * factor));
    // Anchor: keep the content under mouseY in place
    yOffset = (yOffset - (e.clientY - 90)) * (yScale / oldScale) + (e.clientY - 90);
    clampYOffset();
    draw();
  } else if (e.shiftKey) {
    // Shift+wheel → vertical scroll
    yOffset -= e.deltaY * 0.8;
    clampYOffset();
    draw();
  } else {
    // Normal wheel → horizontal zoom centered on mouseX
    const factor = e.deltaY > 0 ? 1.12 : 0.89;
    zoomBy(factor, e.clientX);
  }
}, { passive: false });

// ════════════════════════════════════════════
//  TOUCH SUPPORT — pinch zoom + single-finger pan
// ════════════════════════════════════════════
let _touches = {};          // active touches by identifier
let _pinchDist0 = null;     // initial pinch distance
let _pinchMid0  = null;     // initial pinch midpoint X
let _pinchView0 = null;     // viewStart/End at pinch start
let _tapStartX  = 0;
let _tapStartY  = 0;
let _tapStartTime = 0;

function _touchDist(t1, t2) {
  return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}
function _touchMidX(t1, t2) {
  return (t1.clientX + t2.clientX) / 2;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) _touches[t.identifier] = t;
  const ids = Object.keys(_touches);

  if (ids.length === 1) {
    // Single finger — start pan
    const t = _touches[ids[0]];
    isDragging    = true;
    dragStartX    = t.clientX;
    dragStartY    = t.clientY;
    dragViewStart = viewStart;
    dragYOffset   = yOffset;
    _tapStartX    = t.clientX;
    _tapStartY    = t.clientY;
    _tapStartTime = Date.now();
    _pinchDist0   = null;
  } else if (ids.length === 2) {
    // Two fingers — start pinch
    isDragging = false;
    const [t1, t2] = ids.map(id => _touches[id]);
    _pinchDist0  = _touchDist(t1, t2);
    _pinchMid0   = _touchMidX(t1, t2);
    _pinchView0  = { start: viewStart, end: viewEnd };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) _touches[t.identifier] = t;
  const ids = Object.keys(_touches);

  if (ids.length === 2 && _pinchDist0 !== null) {
    // Pinch zoom
    const [t1, t2] = ids.map(id => _touches[id]);
    const dist = _touchDist(t1, t2);
    const midX = _touchMidX(t1, t2);
    const scale = _pinchDist0 / dist;   // >1 = zoom out, <1 = zoom in

    const span0  = _pinchView0.end - _pinchView0.start;
    let newSpan  = span0 * scale;
    newSpan      = Math.max(2, Math.min(globalViewSpan(), newSpan));

    // Keep midpoint year fixed
    const midYear0 = _pinchView0.start + (_pinchMid0 / canvasW) * span0;
    const ratio    = midX / canvasW;
    viewStart = midYear0 - ratio * newSpan;
    viewEnd   = viewStart + newSpan;

    // Pan horizontally with midpoint drift
    const panDx   = midX - _pinchMid0;
    const yearDx  = -(panDx / canvasW) * newSpan;
    viewStart += yearDx * 0.5;
    viewEnd    = viewStart + newSpan;

    clampView();
    draw();

  } else if (ids.length === 1 && isDragging && _pinchDist0 === null) {
    // Single finger pan
    const t  = _touches[ids[0]];
    const dx = t.clientX - dragStartX;
    const dy = t.clientY - dragStartY;
    const span   = viewEnd - viewStart;
    viewStart = dragViewStart - (dx / canvasW) * span;
    viewEnd   = viewStart + span;
    clampView();
    yOffset   = dragYOffset + dy;
    clampYOffset();
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) delete _touches[t.identifier];
  const remaining = Object.keys(_touches).length;

  if (remaining === 0) {
    // Check for tap
    const dt = Date.now() - _tapStartTime;
    if (isDragging && dt < 250 &&
        Math.hypot(e.changedTouches[0].clientX - _tapStartX,
                   e.changedTouches[0].clientY - _tapStartY) < 10) {
      handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
    isDragging  = false;
    _pinchDist0 = null;
    draw();
  } else if (remaining === 1) {
    // Went from 2 fingers to 1 — restart pan from current position
    _pinchDist0 = null;
    const id = Object.keys(_touches)[0];
    const t  = _touches[id];
    isDragging    = true;
    dragStartX    = t.clientX;
    dragStartY    = t.clientY;
    dragViewStart = viewStart;
    dragYOffset   = yOffset;
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) delete _touches[t.identifier];
  isDragging = false; _pinchDist0 = null;
}, { passive: false });
canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX    = e.clientX;
  dragStartY    = e.clientY;
  dragViewStart = viewStart;
  dragYOffset   = yOffset;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('pointermove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (isDragging) {
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    // Horizontal pan
    const span    = viewEnd - viewStart;
    const yearDx  = -(dx / canvasW) * span;
    viewStart = dragViewStart + yearDx;
    viewEnd   = viewStart + span;
    clampView();
    // Vertical pan
    yOffset = dragYOffset + dy;
    clampYOffset();
    draw();
  } else if (e.pointerType !== 'touch') {
    // Only show hover tooltip on non-touch devices
    handleHover(e.clientX, e.clientY);
    draw();
  }
});

canvas.addEventListener('pointerleave', () => {
  mouseX = -1; mouseY = -1;
  draw();
});

canvas.addEventListener('pointerup', e => {
  if (isDragging) {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
    // Check if it was a click (minimal movement)
    if (Math.abs(e.clientX - dragStartX) < 5) {
      handleClick(e.clientX, e.clientY);
    }
  }
});

// ════════════════════════════════════════════
//  HOVER
// ════════════════════════════════════════════
// Find ALL events near click (for overlap detection)
function findEventsAt(mx, my) {
  const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
  const HIT_DOT  = isTouchDevice ? 28 : 18;
  const HIT_PILL = isTouchDevice ? 20 : 12;
  const results  = [];
  const offsets  = getPillOffsets();
  const zoom     = currentZoom();

  events.forEach(ev => {
    if (!eventVisible(ev)) return;

    let y = axisY(ev.axis);
    if (ev.endYear && !resolvedParent(ev)) {
      y += offsets.get(ev.id) ?? 0;
    }
    if (resolvedParent(ev) && expandedEvents.has(resolvedParent(ev))) {
      const parent = events.find(e => e.id === resolvedParent(ev));
      if (parent) y = childRowY(axisY(parent.axis), 1);
    }

    if (ev.endYear) {
      const x1 = yearToX(ev.year), x2 = yearToX(ev.endYear);
      if (mx >= x1 - 4 && mx <= x2 + 4 && Math.abs(my - y) <= HIT_PILL + 4) {
        const span = Math.abs(x2 - x1) || 1;
        results.push({ ev, dist: Math.abs(my - y) * 2 + 1 / span });
      }
    } else {
      const x = yearToX(ev.year), d = Math.hypot(mx - x, my - y);
      if (d <= Math.max(HIT_DOT, dotRadius(ev) + 12)) results.push({ ev, dist: d });

      // Also hit-test crossRef hollow circle on target axis
      if (ev.crossRef && zoom >= 0.55 && !hiddenAxes.has(ev.crossRef)) {
        const y2 = axisY(ev.crossRef);
        const d2 = Math.hypot(mx - x, my - y2);
        if (d2 <= Math.max(HIT_DOT, dotRadius(ev) + 12)) {
          results.push({ ev, dist: d2 + 0.1 }); // slight penalty vs original
        }
      }
    }
  });
  results.sort((a, b) => a.dist - b.dist);
  // Deduplicate (same ev can appear twice from crossRef)
  const seen = new Set();
  return results.filter(r => {
    if (seen.has(r.ev.id)) return false;
    seen.add(r.ev.id); return true;
  }).map(r => r.ev);
}

function findEventAt(mx, my) { return findEventsAt(mx, my)[0] || null; }

function handleHover(mx, my) {
  const ev = findEventAt(mx, my);
  const tooltip = document.getElementById('tooltip');
  if (ev) {
    // Update hoveredPillId for ℹ rendering
    if (hoveredPillId !== ev.id) { hoveredPillId = ev.id; draw(); }
    if (!hoveredEvent || hoveredEvent.id !== ev.id) { hoveredEvent = ev; draw(); }

    canvas.style.cursor = 'pointer';
    document.getElementById('tt-era').textContent = (AXES[ev.axis] && AXES[ev.axis].label) || ev.axis;
    document.getElementById('tt-era').style.color = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';
    document.getElementById('tt-zh').textContent  = ev.zh;
    document.getElementById('tt-en').textContent  = ev.en;
    const timeStr = ev.endYear
      ? `${formatYear(ev.year)} — ${formatYear(ev.endYear)}`
      : formatYear(ev.year);
    document.getElementById('tt-time').textContent = timeStr;

    let tx = mx + 16, ty = my - 10;
    if (tx + 230 > canvasW) tx = mx - 230;
    if (ty + 120 > canvasH) ty = my - 120;
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
    tooltip.classList.add('show');
  } else {
    if (hoveredEvent || hoveredPillId) {
      hoveredEvent  = null;
      hoveredPillId = null;
      draw();
    }
    canvas.style.cursor = 'crosshair';
    tooltip.classList.remove('show');
  }
}

// ════════════════════════════════════════════
//  OVERLAP MENU
// ════════════════════════════════════════════
const overlapMenu = document.getElementById('overlap-menu');

function showOverlapMenu(evList, mx, my) {
  const list = document.getElementById('overlap-list');
  list.innerHTML = '';
  evList.forEach(ev => {
    const color = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';
    const timeStr = ev.endYear
      ? formatYear(ev.year) + ' — ' + formatYear(ev.endYear)
      : formatYear(ev.year);
    const item = document.createElement('div');
    item.className = 'overlap-item';
    item.innerHTML = '<div class="overlap-dot" style="background:' + color + '"></div>'
      + '<span class="overlap-zh">' + ev.zh + '</span>'
      + '<span class="overlap-time">' + timeStr + '</span>';
    item.addEventListener('click', e => { e.stopPropagation(); hideOverlapMenu(); showPopup(ev); });
    list.appendChild(item);
  });
  overlapMenu.classList.add('show');
  const mw = overlapMenu.offsetWidth || 260;
  const mh = overlapMenu.offsetHeight || evList.length * 38 + 50;
  let left = mx + 12, top = my + 12;
  if (left + mw > window.innerWidth  - 10) left = mx - mw - 12;
  if (top  + mh > window.innerHeight - 10) top  = my - mh - 12;
  overlapMenu.style.left = Math.max(4, left) + 'px';
  overlapMenu.style.top  = Math.max(4, top)  + 'px';
}

function hideOverlapMenu() { overlapMenu.classList.remove('show'); }

document.addEventListener('pointerdown', e => {
  if (!overlapMenu.contains(e.target) && e.target !== canvas) hideOverlapMenu();
});

// ════════════════════════════════════════════
//  CLICK → EXPAND / POPUP
// ════════════════════════════════════════════
// Check if click is on the ℹ button of a hovered pill
function isInfoClick(ev, mx, my) {
  if (!ev.endYear) return false;
  // Use the same rx2 as drawPill (clamped to canvas)
  const x2    = yearToX(ev.endYear);
  const rx2   = Math.min(canvasW + 40, x2);
  const y     = getPillY(ev);
  const infoX = Math.min(rx2 - 11, canvasW - 11);
  return Math.hypot(mx - infoX, my - y) <= 12;
}

function getPillY(ev) {
  // Child pills expanded below parent
  if (resolvedParent(ev) && expandedEvents.has(resolvedParent(ev))) {
    const parent = events.find(e => e.id === resolvedParent(ev));
    if (parent) return childRowY(axisY(parent.axis), 1);
  }
  // Apply stacking offset for partial-overlap pills
  const offsets = getPillOffsets();
  const base = axisY(ev.axis);
  return base + (offsets.get(ev.id) ?? 0);
}

function handleClick(mx, my) {
  hideOverlapMenu();
  const hits = findEventsAt(mx, my);
  if (hits.length === 0) return;

  const ev = hits[0];   // top hit

  // If it's a pill with children → check which zone was clicked
  if (ev.endYear && hasChildren(ev)) {
    if (isInfoClick(ev, mx, my)) {
      showPopup(ev);   // ℹ zone → popup
    } else {
      // Left zone → expand / collapse
      if (expandedEvents.has(ev.id)) {
        expandedEvents.delete(ev.id);
      } else {
        expandedEvents.add(ev.id);
      }
      draw();
    }
    return;
  }

  // Normal event — open popup (or overlap menu if multiple hits)
  if (hits.length === 1) {
    showPopup(ev);
  } else {
    showOverlapMenu(hits, mx, my);
  }
}

function showPopup(ev) {
  const overlay = document.getElementById('popup-overlay');
  const color = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';

  // Track which event is being edited
  _editingEventId = ev.id;

  // Image
  const imgWrap = document.getElementById('popup-img-wrap');
  if (ev.image) {
    imgWrap.innerHTML = '';
    const img = document.createElement('img');
    img.className = 'popup-img';
    img.src = ev.image;
    img.alt = ev.zh;
    img.onerror = () => {
      imgWrap.innerHTML = '<div class="popup-img-placeholder"><div style="text-align:center"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/></svg><div style="font-size:11px;color:rgba(255,255,255,0.28);margin-top:8px;font-family:sans-serif">圖片無法載入，點 ✏ 編輯更換 URL</div></div></div>';
    };
    imgWrap.appendChild(img);
  } else {
    imgWrap.innerHTML = '<div class="popup-img-placeholder"><div style="text-align:center"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/></svg><div style="font-size:11px;color:rgba(255,255,255,0.28);margin-top:8px;font-family:sans-serif">尚無圖片，點 ✏ 編輯加入 URL</div></div></div>';
  }

  // Tag
  const tag = document.getElementById('popup-tag');
  tag.textContent = ((AXES[ev.axis] && AXES[ev.axis].label) || ev.axis).toUpperCase();
  tag.style.color = color;
  tag.style.borderColor = color + '44';
  tag.style.background = color + '11';

  document.getElementById('popup-zh').textContent = ev.zh;
  document.getElementById('popup-en').textContent = ev.en;
  document.getElementById('popup-time').textContent = ev.endYear
    ? `${formatYear(ev.year)} — ${formatYear(ev.endYear)}`
    : formatYear(ev.year);
  document.getElementById('popup-desc-zh').textContent = ev.desc_zh || '';
  document.getElementById('popup-desc-en').textContent = ev.desc_en || '';

  // Populate edit fields
  document.getElementById('edit-image').value   = ev.image   || '';
  document.getElementById('edit-zh').value      = ev.zh      || '';
  document.getElementById('edit-en').value      = ev.en      || '';
  document.getElementById('edit-desc-zh').value = ev.desc_zh || '';
  document.getElementById('edit-desc-en').value = ev.desc_en || '';
  document.getElementById('edit-wiki-zh').value = ev.wiki_zh || '';
  document.getElementById('edit-wiki-en').value = ev.wiki_en || '';

  // Image preview
  const preview = document.getElementById('edit-img-preview');
  if (ev.image) { preview.src = ev.image; preview.style.display = 'block'; }
  else { preview.style.display = 'none'; }

  // Modified badge
  const n = countEdits();
  const badge = document.getElementById('edit-modified-badge');
  if (n > 0) { badge.textContent = `● ${n} 筆已修改`; badge.classList.add('show'); }
  else { badge.classList.remove('show'); }

  // Close edit panel when switching events
  document.getElementById('edit-panel').classList.remove('show');

  // Links
  const linksEl = document.getElementById('popup-links');
  linksEl.innerHTML = '';
  if (ev.wiki_zh) {
    const a = document.createElement('a');
    a.className = 'popup-link';
    a.href = ev.wiki_zh;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = '📖 中文 Wikipedia';
    linksEl.appendChild(a);
  }
  if (ev.wiki_en) {
    const a = document.createElement('a');
    a.className = 'popup-link';
    a.href = ev.wiki_en;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = '🌐 EN Wikipedia';
    linksEl.appendChild(a);
  }

  overlay.classList.add('show');
}

document.getElementById('popup-close').addEventListener('click', () => {
  document.getElementById('popup-overlay').classList.remove('show');
});
document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popup-overlay')) {
    document.getElementById('popup-overlay').classList.remove('show');
  }
});

// ════════════════════════════════════════════
//  LOAD DATA
// ════════════════════════════════════════════
// ════════════════════════════════════════════
//  AUTO PARENT TREE — builds _autoParent for each event
//  Rules:
//  1. Parent must be a period event (has endYear)
//  2. Child's time range must be STRICTLY inside parent's range
//     (child.year >= parent.year AND childEnd <= parent.endYear)
//  3. Same axis
//  4. Pick the SMALLEST containing parent (most specific)
// ════════════════════════════════════════════
function buildParentTree() {
  // Only period events (those with endYear) can be children.
  const periodsByAxis = {};
  events.forEach(ev => {
    if (!ev.endYear) return;
    if (!periodsByAxis[ev.axis]) periodsByAxis[ev.axis] = [];
    periodsByAxis[ev.axis].push(ev);
  });

  events.forEach(child => {
    child._autoParent = null;
    if (!child.endYear) return;   // point events never get a parent

    const peers = periodsByAxis[child.axis] || [];
    const cSpan = child.endYear - child.year;
    let bestParent = null;
    let bestSpan   = Infinity;

    peers.forEach(parent => {
      if (parent.id === child.id) return;
      const pSpan = parent.endYear - parent.year;
      if (pSpan <= cSpan) return;   // parent must be strictly larger span

      // Containment: child fits within parent (boundaries may be equal)
      // but parent span must be strictly larger (already checked above)
      if (child.year >= parent.year && child.endYear <= parent.endYear) {
        if (pSpan < bestSpan) {
          bestParent = parent;
          bestSpan   = pSpan;
        }
      }
    });

    child._autoParent = bestParent?.id ?? null;
  });
}

// Resolve parentEvent: manual (from JSON) takes priority, else auto
function resolvedParent(ev) {
  return ev.parentEvent ?? ev._autoParent ?? null;
}

async function loadEvents() {
  try {
    const res = await fetch('data/events.json');
    const data = await res.json();
    events = data.events;
  } catch (err) {
    console.warn('Could not load events.json, using inline fallback');
    events = FALLBACK_EVENTS;
  }
  buildParentTree();
  applyEdits();   // apply any localStorage overrides
  draw();
}

// ════════════════════════════════════════════
//  EDIT SYSTEM — localStorage persistence + JSON export
// ════════════════════════════════════════════
const EDIT_KEY = 'cosmic-timeline-edits';  // localStorage key

// Load overrides from localStorage
function loadEdits() {
  try {
    const raw = localStorage.getItem(EDIT_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

// Save override for one event
function saveEdit(id, fields) {
  const edits = loadEdits();
  edits[id] = { ...(edits[id] || {}), ...fields };
  localStorage.setItem(EDIT_KEY, JSON.stringify(edits));
}

// Apply all saved edits to events array
function applyEdits() {
  const edits = loadEdits();
  events.forEach(ev => {
    const ov = edits[ev.id];
    if (!ov) return;
    Object.assign(ev, ov);
  });
}

// Export merged events.json
function exportJSON() {
  const edits = loadEdits();
  // Deep clone and apply edits
  const merged = events.map(ev => {
    const clone = { ...ev };
    delete clone._autoParent;  // remove runtime-only field
    if (edits[clone.id]) Object.assign(clone, edits[clone.id]);
    return clone;
  });
  const blob = new Blob([JSON.stringify({ meta: { title_zh:'宇宙歷史時間軸', title_en:'Cosmic Timeline', total_years:13800000000, created:'2026' }, events: merged }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'events.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Count modified events
function countEdits() {
  return Object.keys(loadEdits()).length;
}

// ── Edit panel wiring ──
let _editingEventId = null;

document.getElementById('popup-edit-btn').addEventListener('click', () => {
  const panel = document.getElementById('edit-panel');
  panel.classList.toggle('show');
});

document.getElementById('popup-export-btn').addEventListener('click', exportJSON);

// Image URL preview
document.getElementById('edit-image').addEventListener('input', e => {
  const preview = document.getElementById('edit-img-preview');
  const url = e.target.value.trim();
  if (url) {
    preview.src = url;
    preview.style.display = 'block';
    preview.onerror = () => { preview.style.display = 'none'; };
  } else {
    preview.style.display = 'none';
  }
});

document.getElementById('edit-save-btn').addEventListener('click', () => {
  if (!_editingEventId) return;
  const fields = {
    image:   document.getElementById('edit-image').value.trim() || undefined,
    zh:      document.getElementById('edit-zh').value.trim() || undefined,
    en:      document.getElementById('edit-en').value.trim() || undefined,
    desc_zh: document.getElementById('edit-desc-zh').value.trim() || undefined,
    desc_en: document.getElementById('edit-desc-en').value.trim() || undefined,
    wiki_zh: document.getElementById('edit-wiki-zh').value.trim() || undefined,
    wiki_en: document.getElementById('edit-wiki-en').value.trim() || undefined,
  };
  // Remove undefined fields
  Object.keys(fields).forEach(k => fields[k] === undefined && delete fields[k]);
  saveEdit(_editingEventId, fields);

  // Apply to live event object immediately
  const ev = events.find(e => e.id === _editingEventId);
  if (ev) Object.assign(ev, fields);

  // Update badge
  document.getElementById('edit-modified-badge').classList.add('show');
  document.getElementById('edit-modified-badge').textContent = `● ${countEdits()} 筆已修改`;

  // Refresh popup display
  showPopup(ev);
  draw();
});

// ════════════════════════════════════════════
//  ERA JUMP BUTTONS
// ════════════════════════════════════════════
document.getElementById('btn-global').addEventListener('click', () => {
  const span   = globalViewSpan();
  const tStart = TIMELINE_START - span * 0.10;
  const tEnd   = tStart + span;
  // Animate directly without extra padding
  const fromStart = viewStart, fromEnd = viewEnd;
  const t0 = performance.now(), dur = 420;
  function step(now) {
    const t = Math.min(1, (now - t0) / dur);
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    viewStart = fromStart + (tStart - fromStart) * e;
    viewEnd   = fromEnd   + (tEnd   - fromEnd)   * e;
    clampView(); draw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
});

document.querySelectorAll('.era-btn[data-start]').forEach(btn => {
  btn.addEventListener('click', () => {
    const start = parseFloat(btn.dataset.start);
    const end   = parseFloat(btn.dataset.end);
    jumpTo(start, end);
  });
});

let _lastIndicatorMode = null;

function updateCategoryIndicator() {
  const zoom = currentZoom();
  const ind  = document.getElementById('cat-indicator');
  const inner = document.getElementById('cat-indicator-inner');

  // Hide in axis-colour mode
  if (zoom >= ZOOM_CATEGORY) {
    ind.classList.remove('visible');
    _lastIndicatorMode = null;
    return;
  }

  const isBroad = zoom < ZOOM_BROAD;
  const mode = isBroad ? 'broad' : 'category';

  // Only rebuild DOM if mode changed
  if (mode !== _lastIndicatorMode) {
    _lastIndicatorMode = mode;
    inner.innerHTML = '';
    const items = isBroad ? BROAD_ITEMS : CAT_ITEMS;
    items.forEach(item => {
      if (!item) {
        const d = document.createElement('div');
        d.className = 'cat-divider';
        inner.appendChild(d);
        return;
      }
      const el = document.createElement('div');
      el.className = 'cat-item';
      el.dataset.key = item.key;
      el.innerHTML = `<span class="cat-dot" style="background:${item.color}"></span>${item.label}`;
      el.addEventListener('click', () => {
        if (highlightedCategory === item.key) {
          highlightedCategory = null;
        } else {
          highlightedCategory = item.key;
        }
        updateCategoryIndicator();
        draw();
      });
      inner.appendChild(el);
    });
  }

  // Update active/dimmed state
  inner.querySelectorAll('.cat-item').forEach(el => {
    const key = el.dataset.key;
    if (!highlightedCategory) {
      el.classList.remove('active','dimmed');
    } else if (key === highlightedCategory) {
      el.classList.add('active');
      el.classList.remove('dimmed');
    } else {
      el.classList.add('dimmed');
      el.classList.remove('active');
    }
  });

  ind.classList.add('visible');
}

// Hook into draw cycle
const _origDraw = draw;
function draw() {
  _origDraw();
  updateCategoryIndicator();
}
