<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>宇宙歷史時間軸 · Cosmic Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050810;
  --bg2: #0a0e1a;
  --text: #ddd8c8;
  --text-muted: rgba(221,216,200,0.45);
  --axis-color: rgba(255,255,255,0.15);
  --cosmos:   #a78bfa;
  --earth:    #60a5fa;
  --life:     #34d399;
  --human:    #fbbf24;
  --east:     #f87171;
  --west:     #c084fc;
  --cross:    #e2e8f0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
  height: 100vh;
  cursor: crosshair;
  user-select: none;
}

/* ─── STARS ─── */
#stars-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 16px 28px 12px;
  background: linear-gradient(to bottom, rgba(5,8,16,0.97) 60%, transparent);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
#header h1 {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.18em; color: var(--text);
  white-space: nowrap;
}
#header p {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--text-muted);
}

/* ─── AXIS LEGEND ─── */
#legend {
  position: fixed; top: 54px; left: 0; right: 0; z-index: 49;
  display: flex; align-items: center; justify-content: center; gap: 18px;
  padding: 6px 24px;
  background: linear-gradient(to bottom, rgba(5,8,16,0.6) 0%, transparent);
}
.leg {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: 0.05em;
  color: var(--text-muted); opacity: 0.85;
  cursor: pointer; transition: opacity .2s;
}
.leg:hover { opacity: 1; }
.leg-sub {
  font-size: 9px; opacity: 0.45;
}
.leg-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
}
.leg-sub .leg-dot { width: 5px; height: 5px; }
#legend-zoom-hint {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 8px; color: rgba(221,216,200,0.2);
  letter-spacing: 0.05em; padding: 0 4px;
  pointer-events: none;
}

/* ─── MAIN CANVAS ─── */
#timeline-canvas {
  position: fixed; inset: 0; z-index: 10;
  display: block;
}

/* ─── TIME DISPLAY ─── */
#time-display {
  position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--text-muted);
  background: rgba(5,8,16,0.75);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 5px 16px; border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(6px);
  white-space: nowrap;
}

/* ─── SCALE BAR ─── */
#scale-bar {
  position: fixed; bottom: 68px; left: 20px; z-index: 50;
  display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
}
#scale-label {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; color: rgba(221,216,200,0.45);
  letter-spacing: 0.08em; margin-bottom: 2px;
}
#scale-line-wrap { display: flex; align-items: center; }
.scale-cap { width: 1px; height: 8px; background: rgba(221,216,200,0.35); display: inline-block; }
#scale-line { height: 2px; background: rgba(221,216,200,0.35); display: inline-block; }

/* ─── RIGHT PANEL: V-zoom + V-scrollbar ─── */
#right-panel {
  position: fixed; right: 0; top: 80px; bottom: 80px;
  width: 36px; z-index: 50;
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
  background: rgba(5,8,16,0.75);
  border-left: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(8px);
}

/* V-zoom slider top portion */
#vzoom-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 8px 0;
  flex: 0 0 auto;
}
.vpanel-label {
  font-size: 11px; color: rgba(221,216,200,0.35);
  line-height: 1; user-select: none;
}
#yzoom-slider {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
  writing-mode: vertical-lr;
  direction: rtl;
  width: 6px;
  cursor: pointer;
  accent-color: rgba(96,165,250,0.7);
  background: transparent;
}
.vpanel-divider {
  width: 20px; height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 4px 0; flex-shrink: 0;
}

/* V-scrollbar lower portion */
#vscroll-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 4px 0; min-height: 0;
}
#vscroll-track {
  flex: 1; width: 6px; position: relative;
  background: rgba(255,255,255,0.07);
  border-radius: 3px; cursor: pointer;
  min-height: 40px;
}
#vscroll-thumb {
  position: absolute; left: 0; width: 100%;
  background: rgba(255,255,255,0.22);
  border-radius: 3px; cursor: grab; min-height: 20px;
  transition: background .15s;
}
#vscroll-thumb:hover { background: rgba(255,255,255,0.38); }
#vscroll-thumb.dragging { background: rgba(96,165,250,0.6); cursor: grabbing; }

/* Reset button */
#btn-reset {
  width: 26px; height: 26px; flex-shrink: 0;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%; cursor: pointer;
  color: rgba(221,216,200,0.4); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; margin: 6px 0;
}
#btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

/* ─── BOTTOM BAR: H-scrollbar + H-zoom + era jumps ─── */
#bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 36px;
  height: 88px; z-index: 50;
  display: flex; flex-direction: column; align-items: stretch;
  padding: 0 20px;
  background: linear-gradient(to top, rgba(5,8,16,0.97) 80%, transparent);
  gap: 5px; justify-content: flex-end; padding-bottom: 8px;
}

/* Era jump buttons row */
#era-jumps {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; flex-wrap: nowrap; overflow-x: auto;
}
.era-btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; font-weight: 500;
  padding: 3px 10px; border-radius: 12px;
  border: 1px solid; cursor: pointer;
  background: transparent;
  transition: all .15s; white-space: nowrap;
  opacity: 0.65;
}
.era-btn:hover { opacity: 1; filter: brightness(1.3); }

/* H scrollbar row */
#hscroll-row {
  display: flex; align-items: center; gap: 8px;
}
#scrollbar-track {
  position: relative; flex: 1; height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px; cursor: pointer;
}
#scrollbar-thumb {
  position: absolute; top: 0; height: 100%;
  background: rgba(255,255,255,0.22);
  border-radius: 3px; cursor: grab; min-width: 24px;
  transition: background .15s;
}
#scrollbar-thumb:hover { background: rgba(255,255,255,0.38); }
#scrollbar-thumb.dragging { background: rgba(167,139,250,0.6); cursor: grabbing; }

/* H zoom slider row — centred, 2× wider */
#hzoom-row {
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.hzoom-label {
  font-size: 12px; color: rgba(221,216,200,0.35);
  user-select: none; line-height: 1;
}
#zoom-slider {
  width: 280px; height: 4px;
  cursor: pointer;
  accent-color: rgba(167,139,250,0.8);
  -webkit-appearance: auto;
  appearance: auto;
}

/* ─── TOOLTIP ─── */
#tooltip {
  position: fixed; z-index: 200;
  pointer-events: none;
  opacity: 0; transition: opacity .18s;
  max-width: 220px;
  transform: translateY(-4px);
}
#tooltip.show { opacity: 1; transform: translateY(0); }
.tt-box {
  background: rgba(5,8,16,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 10px 13px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.tt-era {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 5px;
}
.tt-zh { font-size: 14px; font-weight: 500; margin-bottom: 1px; line-height: 1.3; }
.tt-en { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
.tt-time { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; color: var(--text-muted); }

/* ─── POPUP ─── */
#popup-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(5,8,16,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
#popup-overlay.show { opacity: 1; pointer-events: all; }
#popup {
  background: rgba(10,14,26,0.98);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  width: min(560px, 92vw);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  transform: translateY(12px) scale(0.97);
  transition: transform .25s;
}
#popup-overlay.show #popup { transform: translateY(0) scale(1); }

.popup-img {
  width: 100%;
  max-height: 320px;
  object-fit: contain;
  border-radius: 13px 13px 0 0;
  background: #070b18;
  display: block;
}
.popup-img-placeholder {
  width: 100%; height: 160px;
  border-radius: 13px 13px 0 0;
  background: linear-gradient(135deg, #0a0e1a 0%, #131929 100%);
  display: flex; align-items: center; justify-content: center;
}
.popup-img-placeholder svg { opacity: 0.15; }

.popup-body { padding: 20px 24px 24px; }
.popup-axis-tag {
  display: inline-block; margin-bottom: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 12px;
  border: 1px solid;
}
.popup-title-zh {
  font-size: 22px; font-weight: 500;
  line-height: 1.3; margin-bottom: 3px;
}
.popup-title-en {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.popup-time {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; color: var(--text-muted);
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.popup-desc-zh { font-size: 14px; line-height: 1.9; margin-bottom: 8px; }
.popup-desc-en { font-size: 12px; line-height: 1.8; color: var(--text-muted); margin-bottom: 20px; }
.popup-links {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.popup-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; letter-spacing: 0.05em;
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 14px; border-radius: 20px;
  text-decoration: none; cursor: pointer;
  transition: all .2s; background: transparent;
}
.popup-link:hover {
  color: var(--text); border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05);
}
.popup-close {
  position: absolute; top: 14px; right: 14px;
  width: 30px; height: 30px;
  background: rgba(5,8,16,0.8); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 14px;
  transition: all .2s; z-index: 10;
  font-family: monospace;
}
.popup-close:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
#popup-overlay { position: fixed; }
#popup { position: relative; }

/* Edit panel */
.popup-edit-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; letter-spacing: 0.05em;
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 14px; border-radius: 20px;
  cursor: pointer; transition: all .2s; background: transparent;
}
.popup-edit-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

#edit-panel {
  display: none;
  margin-top: 16px;
  padding: 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
}
#edit-panel.show { display: block; }
.edit-row { margin-bottom: 12px; }
.edit-label {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; color: var(--text-muted);
  letter-spacing: 0.08em; margin-bottom: 5px;
}
.edit-input {
  width: 100%; padding: 8px 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; box-sizing: border-box;
  transition: border-color .15s;
}
.edit-input:focus { outline: none; border-color: rgba(255,255,255,0.3); }
.edit-textarea { min-height: 72px; resize: vertical; }
.edit-img-preview {
  width: 100%; height: 100px; object-fit: cover;
  border-radius: 6px; margin-top: 6px; display: none;
}
.edit-actions {
  display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
}
.edit-save-btn {
  flex: 1; padding: 8px 16px; border-radius: 8px; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500;
  border: none; background: rgba(96,165,250,0.2); color: #60a5fa;
  border: 1px solid rgba(96,165,250,0.3); transition: all .15s;
}
.edit-save-btn:hover { background: rgba(96,165,250,0.35); }
.edit-export-btn {
  flex: 1; padding: 8px 16px; border-radius: 8px; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500;
  border: 1px solid rgba(255,255,255,0.15); background: transparent;
  color: var(--text-muted); transition: all .15s;
}
.edit-export-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.edit-modified-badge {
  font-family: 'Noto Sans TC', sans-serif; font-size: 10px;
  color: #fbbf24; letter-spacing: 0.06em; display: none;
  align-items: center; gap: 4px;
}
.edit-modified-badge.show { display: flex; }

/* Overlap picker menu */
#overlap-menu {
  position: fixed;
  display: none;
  min-width: 220px;
  max-width: 320px;
  background: rgba(8,12,24,0.96);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 10px 0 8px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}
#overlap-menu.show { display: block; }
#overlap-title {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px;
  color: rgba(221,216,200,0.4);
  letter-spacing: 0.08em;
  padding: 0 14px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 4px;
}
.overlap-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  cursor: pointer;
  transition: background .12s;
  font-family: 'Noto Sans TC', sans-serif;
}
.overlap-item:hover { background: rgba(255,255,255,0.06); }
.overlap-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.overlap-zh { font-size: 13px; color: rgba(221,216,200,0.9); }
.overlap-time { font-size: 10px; color: rgba(221,216,200,0.4); margin-left: auto; white-space: nowrap; }

/* ═══════════════════════════════════════
   MOBILE / TOUCH  styles
═══════════════════════════════════════ */

/* ── Category Indicator ── */
#cat-indicator {
  position: fixed;
  top: 14px; right: 14px;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}
#cat-indicator.visible { opacity: 1; pointer-events: all; }
#cat-indicator-inner {
  background: rgba(5,8,16,0.88);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 4px;
  backdrop-filter: blur(8px);
  min-width: 130px;
}
.cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 6px; border-radius: 6px;
  cursor: pointer; transition: background .12s;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; color: rgba(221,216,200,0.75);
  white-space: nowrap;
}
.cat-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
.cat-item.active { background: rgba(255,255,255,0.10); color: #fff; }
.cat-item.dimmed { opacity: 0.35; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 3px 0; }

/* Landscape hint — shown on portrait phones */
#landscape-hint {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(5,8,16,0.97);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: rgba(221,216,200,0.8);
  font-family: 'Noto Sans TC', sans-serif;
  text-align: center; padding: 24px;
}
#landscape-hint .hint-icon { font-size: 48px; animation: rotate90 1.2s ease-in-out infinite alternate; }
@keyframes rotate90 { from { transform: rotate(0deg); } to { transform: rotate(90deg); } }
#landscape-hint p { font-size: 15px; line-height: 1.6; }
#landscape-hint small { font-size: 12px; color: rgba(221,216,200,0.4); }
#landscape-hint button {
  margin-top: 8px; padding: 10px 24px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; color: rgba(221,216,200,0.8);
  font-family: inherit; font-size: 13px; cursor: pointer;
}

@media (max-width: 768px) {
  /* Show landscape hint on portrait */
  @media (orientation: portrait) {
    #landscape-hint { display: flex; }
  }

  /* Popup full-screen on mobile */
  #popup {
    width: 100vw !important;
    max-height: 90vh;
    border-radius: 16px 16px 0 0;
    position: fixed;
    bottom: 0; left: 0;
  }
  #popup-overlay {
    align-items: flex-end;
  }
  #popup-overlay.show #popup {
    transform: translateY(0) scale(1);
  }
  #popup-overlay #popup {
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(0.32,0.72,0,1);
  }
  #popup-overlay.show #popup {
    transform: translateY(0);
  }

  /* Era buttons — scrollable, bigger tap targets */
  #era-jumps { justify-content: flex-start; padding-bottom: 2px; }
  .era-btn { padding: 6px 12px; font-size: 11px; }

  /* Zoom slider wider on mobile */
  #zoom-slider { width: 200px; }

  /* Bottom bar taller for finger taps */
  #bottom-bar { height: 96px; padding-bottom: 10px; }

  /* Overlap menu wider */
  #overlap-menu { min-width: 260px; }
  .overlap-item { padding: 10px 14px; }
  .overlap-zh { font-size: 14px; }

  /* Edit panel inputs easier to tap */
  .edit-input { padding: 10px 12px; font-size: 15px; }
  .edit-save-btn, .edit-export-btn { padding: 12px 16px; font-size: 13px; }
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- Category colour indicator (top-right) -->
<div id="cat-indicator">
  <div id="cat-indicator-inner"></div>
</div>

<!-- Mobile landscape hint -->
<div id="landscape-hint">
  <div class="hint-icon">📱</div>
  <p>請將手機<strong>橫向</strong>使用<br>以獲得最佳體驗</p>
  <small>Rotate your device to landscape</small>
  <button onclick="document.getElementById('landscape-hint').style.display='none'">繼續直向瀏覽</button>
</div>

<div id="header">
  <h1>COSMIC TIMELINE · 宇宙歷史時間軸</h1>
  <p>138億年 · 13.8 BILLION YEARS</p>
</div>

<div id="legend">
  <div class="leg" data-axis="cosmos"><div class="leg-dot" style="background:#a78bfa"></div>宇宙</div>
  <div class="leg" data-axis="earth"><div class="leg-dot" style="background:#60a5fa"></div>地球</div>
